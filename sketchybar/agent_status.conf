# Source this from sketchybarrc after colors/defaults are configured.
# The renderer dynamically owns items named agent.*.
AGENT_STATUS_HOME="${AGENT_STATUS_HOME:-$HOME/.local/share/sketchybar-agent-status}"
AGENT_STATUS_POSITION="${AGENT_STATUS_POSITION:-right}"
sketchybar --add event agent_status_change
sketchybar --add item agent_status_anchor "$AGENT_STATUS_POSITION" \
  --set agent_status_anchor drawing=off updates=on script="$AGENT_STATUS_HOME/scripts/agent_status.sh" \
  --subscribe agent_status_anchor agent_status_change
"$AGENT_STATUS_HOME/scripts/agent_status.sh"

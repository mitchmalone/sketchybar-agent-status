# Source this from sketchybarrc after colors/defaults are configured.
# The renderer dynamically owns items named agent.*.
AGENT_STATUS_HOME="${AGENT_STATUS_HOME:-$HOME/.local/share/sketchybar-agent-status}"
AGENT_STATUS_POSITION="${AGENT_STATUS_POSITION:-right}"
AGENT_STATUS_ANCHOR="${AGENT_STATUS_ANCHOR:-agent_status_anchor}"
AGENT_STATUS_RENDERER="AGENT_STATUS_POSITION=$AGENT_STATUS_POSITION AGENT_STATUS_ANCHOR=$AGENT_STATUS_ANCHOR $AGENT_STATUS_HOME/scripts/agent_status.sh"
sketchybar --add event agent_status_change
# Recreate the invisible anchor on config reload so placement changes also move
# existing session widgets, rather than leaving them on their original side.
sketchybar --remove "$AGENT_STATUS_ANCHOR" 2>/dev/null || true
sketchybar --add item "$AGENT_STATUS_ANCHOR" "$AGENT_STATUS_POSITION" \
  --set "$AGENT_STATUS_ANCHOR" drawing=off width=0 padding_left=0 padding_right=0 updates=on script="$AGENT_STATUS_RENDERER" \
  --subscribe "$AGENT_STATUS_ANCHOR" agent_status_change
AGENT_STATUS_POSITION="$AGENT_STATUS_POSITION" AGENT_STATUS_ANCHOR="$AGENT_STATUS_ANCHOR" "$AGENT_STATUS_HOME/scripts/agent_status.sh"
